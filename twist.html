<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slack — 스스라</title>
<style>
  :root{ --slack-purple:#3F0E40; --slack-active:#1164A3; --ink:#1D1C1D; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#000; overflow:hidden;
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; }

  /* 맥 데스크탑 배경 */
  #macBg{
    position:fixed; inset:0;
    background:linear-gradient(150deg,#1d2233,#161222 60%,#241a26);
    display:flex; flex-direction:column;
  }
  .menubar{
    height:28px; background:rgba(22,22,28,0.75); backdrop-filter:blur(10px);
    display:flex; align-items:center; padding:0 14px; gap:16px;
    font-size:12px; color:#e2e2e6; flex-shrink:0;
  }
  .menubar .sp{ flex:1; }

  /* 슬랙 창 */
  .mwin{
    position:absolute; inset:6% 9%; background:#fff; border-radius:11px; overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,0.55); display:flex; flex-direction:column;
  }
  .mtitle{ height:34px; background:#ececef; display:flex; align-items:center; padding:0 12px; gap:7px; flex-shrink:0; font-size:12px; color:#555; }
  .dot{ width:11px; height:11px; border-radius:50%; }
  .dot.r{ background:#ff5f57; } .dot.y{ background:#febc2e; } .dot.g{ background:#28c840; }
  .mtitle .tname{ flex:1; text-align:center; margin-right:40px; }
  .sl-body{ flex:1; display:flex; min-height:0; }
  .sl-side{ width:190px; background:var(--slack-purple); color:#c9a8cc; padding:12px 0; font-size:13px; flex-shrink:0; }
  .sl-side .t{ color:#fff; font-weight:700; padding:0 14px 12px; font-size:14px; }
  .sl-item{ padding:4px 14px 4px 22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sl-item.active{ background:var(--slack-active); color:#fff; }
  .sl-chat{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .sl-head{
    padding:11px 16px; border-bottom:1px solid #e2e2e2; font-weight:700; font-size:14px; color:var(--ink);
    flex-shrink:0; display:flex; align-items:center; gap:9px;
  }
  .sl-head .hav{ width:24px; height:24px; border-radius:5px; background:#7f77dd center/cover; }
  .sl-log{ flex:1; overflow-y:auto; padding:16px 18px; }
  .msg-group{ display:flex; gap:10px; margin-bottom:15px; }
  .msg-group .avatar{
    width:36px; height:36px; border-radius:6px; flex-shrink:0; background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:600;
  }
  .mname{ font-weight:700; font-size:14px; color:var(--ink); }
  .mtime{ font-size:11.5px; color:#868686; margin-left:8px; }
  .mline{ font-size:14px; color:var(--ink); line-height:2; word-break:break-word; white-space:pre-wrap; }
  .mline .edited{ font-size:11px; color:#a0a0a0; margin-left:6px; }

  /* 공개된 빈 메시지 (존재 대사) */
  .mline.revealed{
    font-family:"Courier New",monospace; color:#8a0f18; position:relative;
    text-shadow:1px 0 rgba(193,18,31,0.5);
    animation:revealJit 0.16s steps(2) infinite;
  }
  @keyframes revealJit{ 50%{ transform:translateX(0.7px); } }
  .mline.revealed .resend{
    font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;
    font-size:11px; color:#a0a0a0; margin-left:10px; text-shadow:none; animation:none; display:inline-block;
  }
  .glitch-partial{ opacity:0.85; }

  /* 로딩되던 사진 → 이제 보임 */
  .img-loaded{
    width:250px; margin-top:6px; border-radius:8px; overflow:hidden; border:1px solid #ddd;
  }
  .img-loaded img{ width:100%; display:block; image-rendering:pixelated; }

  .typing{ padding:4px 20px 10px; font-size:11.5px; color:#868686; font-style:italic; min-height:24px; flex-shrink:0; }

  /* 독백 */
  #mono{
    position:fixed; z-index:350; left:50%; bottom:7vh; transform:translateX(-50%);
    background:rgba(245,243,238,0.97); color:#161616;
    padding:15px 26px; border-radius:10px; font-size:15px; max-width:78%;
    box-shadow:0 4px 0 rgba(0,0,0,0.55); display:none; text-align:center; cursor:pointer;
  }
  #mono .hint{ display:block; font-size:10px; opacity:0.5; margin-top:6px; letter-spacing:0.2em; }

  /* 맥북 덮기 */
  #closeLid{
    position:fixed; z-index:340; bottom:26px; right:30px; display:none;
    background:rgba(20,20,26,0.85); border:1px solid rgba(255,255,255,0.2);
    color:#e8e8ec; border-radius:12px; padding:12px 20px; font-size:13px; cursor:pointer;
    backdrop-filter:blur(8px);
  }
  #fade{ position:fixed; inset:0; background:#000; z-index:380; opacity:0; pointer-events:none; transition:opacity 1.4s; }

  #crt{
    position:fixed; inset:0; pointer-events:none; z-index:400;
    background:
      radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0, rgba(0,0,0,0.10) 1px, transparent 2px, transparent 4px);
    mix-blend-mode:multiply;
  }
</style>
</head>
<body>
<div id="macBg">
  <div class="menubar"><span></span><span style="font-weight:600">Slack</span><span class="sp"></span><span id="macClock"></span></div>
  <div class="mwin">
    <div class="mtitle"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="tname">Slack — 스스라</span></div>
    <div class="sl-body">
      <div class="sl-side">
        <div class="t">스스라 ▾</div>
        <div class="sl-item" style="opacity:0.8"># 스토리랩_현장운영</div>
        <div class="sl-item" style="opacity:0.65"># 콘텐츠랩_all</div>
        <div style="padding:10px 14px 4px; font-size:12px; opacity:0.8">다이렉트 메시지</div>
        <div class="sl-item" style="opacity:0.8">OOO</div>
        <div class="sl-item active" id="dmName">…</div>
      </div>
      <div class="sl-chat">
        <div class="sl-head"><div class="hav" id="headAv"></div><span id="headName">…</span></div>
        <div class="sl-log" id="log"></div>
        <div class="typing" id="typing"></div>
      </div>
    </div>
  </div>
</div>

<div id="mono"><span class="mtxt"></span><span class="hint">[ 클릭 ]</span></div>
<button id="closeLid">맥북 덮기</button>
<div id="fade"></div>
<div id="crt"></div>

<script src="telemetry.js"></script>
<script src="twist.js"></script>
</body>
</html>
