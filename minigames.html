<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>스토리랩 — 운영</title>
<style>
  :root{
    --slack-purple:#3F0E40;
    --slack-active:#1164A3;
    --ink:#1D1C1D;
    --paper:#f5f3ee;
    --amber:#e8a33d;
    --danger:#c1121f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#0d0d10; overflow:hidden; }
  body{
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  #stage{
    position:relative;
    width:100vw; height:100vh;
    max-width:1180px; max-height:760px;
    background:#000; overflow:hidden;
  }
  /* 배경 (픽셀 사진) */
  .bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    image-rendering:pixelated;
    transition:opacity 0.8s ease, filter 0.8s ease;
  }
  /* CRT 오버레이 */
  #crt{
    position:absolute; inset:0; pointer-events:none; z-index:40;
    background:
      radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px, transparent 2px, transparent 4px);
    mix-blend-mode:multiply;
  }

  /* ========== 공통 패널 ========== */
  /* ========== 맥북 오버레이 (미니게임3 이후) ========== */
  #macHotspot{
    position:absolute; z-index:25; width:110px; height:110px; margin:-55px 0 0 -55px;
    border-radius:50%; cursor:pointer;
  }
  #macHotspot::after{
    content:""; position:absolute; inset:32%; border-radius:50%;
    border:2px solid rgba(255,255,255,0.8); box-shadow:0 0 14px rgba(255,255,255,0.5);
    animation:hsPulse 1.8s ease-in-out infinite;
  }
  @keyframes hsPulse{ 0%,100%{ transform:scale(0.85); opacity:0.7; } 50%{ transform:scale(1.12); opacity:1; } }
  #macOverlay{
    position:fixed; inset:0; z-index:60; display:none; flex-direction:column;
    background:linear-gradient(150deg,#1d2233,#161222 60%,#241a26);
  }
  #macOverlay.on{ display:flex; }
  #macOverlay .menubar{
    height:28px; background:rgba(22,22,28,0.75); backdrop-filter:blur(10px);
    display:flex; align-items:center; padding:0 14px; gap:16px;
    font-size:12px; color:#e2e2e6; flex-shrink:0;
  }
  #macOverlay .menubar .sp{ flex:1; }
  #macOverlay .dock{
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    background:rgba(40,40,48,0.55); backdrop-filter:blur(14px);
    border:0.5px solid rgba(255,255,255,0.12);
    border-radius:18px; padding:8px 14px; display:flex; gap:16px;
  }
  #macOverlay .dapp{
    width:48px; height:48px; border-radius:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:24px;
    transition:transform 0.12s;
  }
  #macOverlay .dapp:hover{ transform:scale(1.14) translateY(-4px); }
  .mwin2{
    position:absolute; inset:8% 12%; z-index:20; background:#fff; border-radius:11px; overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,0.55); display:none; flex-direction:column;
  }
  .mwin2.on{ display:flex; }
  .mwin2 .mtitle{ height:34px; background:#ececef; display:flex; align-items:center; padding:0 12px; gap:7px; flex-shrink:0; font-size:12px; color:#555; }
  .mwin2 .dot{ width:11px; height:11px; border-radius:50%; }
  .dot.r{ background:#ff5f57; cursor:pointer; } .dot.y{ background:#febc2e; } .dot.g{ background:#28c840; }
  .mwin2 .mtitle .tname{ flex:1; text-align:center; margin-right:40px; }
  /* 오늘의 운세 (맥 창 버전) */
  .fortune-body{ flex:1; overflow-y:auto; padding:26px 30px; background:linear-gradient(180deg,#FFF6E9,#FFEFD6); }
  .fortune-body .cap{ font-size:11px; color:#B98A4E; letter-spacing:2px; text-align:center; }
  .fortune-body .kor{ font-size:16px; font-weight:600; color:#6B4423; text-align:center; margin:4px 0 18px; }
  .fortune-body .fcard{ background:#fff; border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:0 2px 8px rgba(107,68,35,0.08); }
  .fortune-body .fcard .fcap{ font-size:11px; color:#B98A4E; margin-bottom:6px; }
  .fortune-body .fcard .ftxt{ font-size:13.5px; color:#5C4530; line-height:1.85; }
  .fortune-body .fsearch{ display:flex; gap:8px; margin-top:8px; }
  .fortune-body input{ flex:1; border:1.5px solid #E8CBA0; border-radius:18px; padding:9px 14px; font-size:13px; outline:none; }
  .fortune-body button{ background:#E8A33D; color:#fff; border:none; border-radius:18px; padding:9px 16px; font-size:12.5px; cursor:pointer; }
  .toast2{
    position:fixed; z-index:70; left:50%; bottom:10vh; transform:translateX(-50%);
    background:rgba(20,20,26,0.9); color:#e8e8ec; padding:10px 18px; border-radius:20px;
    font-size:12.5px; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .toast2.on{ opacity:1; }

  .panel{
    position:absolute; z-index:20;
    left:50%; top:50%; transform:translate(-50%,-50%);
    background:rgba(12,12,16,0.82);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    padding:22px;
    backdrop-filter:blur(3px);
    color:#eee;
    width:min(92%, 720px);
  }
  .panel h2{
    font-size:15px; letter-spacing:0.04em; margin-bottom:6px;
    color:#fff; font-weight:600;
  }
  .panel .sub{ font-size:12.5px; color:#b8b8bd; line-height:1.7; margin-bottom:16px; }

  /* ========== 독백 자막 ========== */
  #monologue{
    position:absolute; z-index:35; left:50%; bottom:16%;
    transform:translateX(-50%);
    background:rgba(245,243,238,0.96); color:#1a1a1a;
    padding:14px 24px; border-radius:10px;
    font-size:15px; letter-spacing:0.02em; max-width:80%;
    box-shadow:0 4px 0 rgba(0,0,0,0.5); display:none; text-align:center;
  }
  #monologue .hint{ display:block; font-size:10px; opacity:0.5; margin-top:6px; letter-spacing:0.2em; }

  /* ========== macOS 슬랙 알림 ========== */
  #macNotif{
    position:absolute; top:16px; right:16px; z-index:50;
    width:330px; display:flex; flex-direction:column; gap:8px;
  }
  .notif{
    background:rgba(40,40,44,0.94); color:#f0f0f2;
    border-radius:13px; padding:11px 13px;
    display:flex; gap:10px; align-items:flex-start;
    box-shadow:0 8px 22px rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    cursor:pointer;
    animation:slideIn 0.4s cubic-bezier(0.2,0.9,0.3,1.3);
    border:0.5px solid rgba(255,255,255,0.08);
  }
  @keyframes slideIn{ from{ transform:translateX(360px); opacity:0; } to{ transform:translateX(0); opacity:1; } }
  .notif .ic{
    width:34px; height:34px; border-radius:8px; flex-shrink:0;
    background:var(--slack-purple);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff; font-size:13px;
  }
  .notif .body{ flex:1; min-width:0; }
  .notif .top{ display:flex; justify-content:space-between; font-size:11px; color:#c8c8cc; margin-bottom:2px; }
  .notif .title{ font-weight:600; }
  .notif .msg{ font-size:12.5px; line-height:1.45; color:#e8e8ea; word-break:break-word; }

  /* ========== 필통 정리 ========== */
  .pc-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }

/* 필통 미니게임 v2: 사진+잉크 캔버스 */
.ink-frame{ position:relative; width:100%; max-width:600px; margin:6px auto 0; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.12); }
.ink-photo{
  width:100%; aspect-ratio:600/340; background:url(assets/mini/bg_pencilcase2.jpg) center/cover; image-rendering:pixelated;
}
#inkCanvas{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.pc-icon-cell{
  display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  padding:12px 6px; transition:border-color 0.15s, background 0.15s;
}
.pc-icon-cell:hover{ border-color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.09); }
.pc-icon{ width:40px; height:40px; }
.pc-icon svg{ width:100%; height:100%; }
.pc-icon-nm{ font-size:11.5px; color:#e6e6e8; }
  .pc-item{
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
    border-radius:9px; padding:8px 11px;
  }
  .pc-item .nm{ font-size:12.5px; color:#e6e6e8; }
  .pc-stepper{ display:flex; align-items:center; gap:9px; }
  .pc-stepper button{
    width:26px; height:26px; border-radius:7px; border:none; cursor:pointer;
    background:rgba(255,255,255,0.12); color:#fff; font-size:15px; line-height:1;
  }
  .pc-stepper button:active{ transform:scale(0.9); }
  .pc-count{ min-width:22px; text-align:center; font-size:14px; font-variant-numeric:tabular-nums; color:#fff; }
  .pc-count.ink{ position:relative; }
  .pc-count.ink::after{
    content:""; position:absolute; inset:-6px -3px; border-radius:50%;
    background:radial-gradient(circle, rgba(5,8,14,0.85), transparent 70%);
    pointer-events:none; opacity:0; animation:inkBlot 1.4s ease forwards;
  }
  @keyframes inkBlot{ 0%{opacity:0;transform:scale(0.3);} 40%{opacity:0.9;} 100%{opacity:0.75;transform:scale(1);} }

  .btn{
    display:inline-block; border:none; cursor:pointer;
    background:var(--amber); color:#1a1200; font-weight:600;
    padding:11px 20px; border-radius:10px; font-size:13.5px;
    letter-spacing:0.03em;
  }
  .btn:active{ transform:translateY(1px); }
  .btn.ghost{ background:rgba(255,255,255,0.1); color:#eee; }
  .row{ display:flex; gap:10px; align-items:center; justify-content:flex-end; }
  .feedback{ font-size:12px; color:#e2a; margin-right:auto; align-self:center; min-height:16px; }

  /* ========== 피규어 순서 ========== */
  .fig-row{ display:flex; gap:12px; justify-content:center; margin:6px 0 16px; flex-wrap:wrap; }
  .fig-slot{
    width:88px; height:88px; border-radius:14px;
    background:rgba(255,255,255,0.06); border:2px dashed rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    font-size:40px; cursor:pointer; user-select:none;
    transition:transform 0.1s, border-color 0.2s;
  }
  .fig-slot:hover{ border-color:rgba(255,255,255,0.4); }
  .fig-slot:active{ transform:scale(0.94); }
  .fig-slot .idx{ position:absolute; margin-top:-58px; margin-left:-58px; font-size:11px; color:#aaa; }

  /* ========== 세팅사진 촬영 ========== */
  #camView{ position:absolute; inset:0; z-index:15; cursor:crosshair; display:none; }
  #sensor{
    position:absolute; z-index:22; width:60px; height:60px; margin:-30px 0 0 -30px;
    pointer-events:none; opacity:0; transition:opacity 0.15s;
  }
  #sensor svg{ width:100%; height:100%; }
  #shutterInfo{
    position:absolute; z-index:22; top:16px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.6); color:#fff; padding:7px 16px; border-radius:20px;
    font-size:12.5px; letter-spacing:0.03em;
  }
  #flash{ position:absolute; inset:0; background:#fff; z-index:30; opacity:0; pointer-events:none; }
  .shot-dot{ position:absolute; z-index:21; width:14px; height:14px; margin:-7px 0 0 -7px;
    border:2px solid #fff; border-radius:50%; box-shadow:0 0 8px rgba(255,255,255,0.7); }

  .hidden{ display:none !important; }

  /* 진행 표시 */
  #progress{
    position:absolute; z-index:45; top:14px; left:16px;
    font-size:11px; letter-spacing:0.14em; color:#8a8a90;
    background:rgba(0,0,0,0.4); padding:5px 12px; border-radius:20px;
  }
</style>
</head>
<body>
<div id="stage">
  <div class="bg" id="bg"></div>
  <div id="camView"></div>



  <!-- 알림 -->
  <div id="macNotif"></div>

  <!-- 독백 -->
  <div id="monologue"><span class="mtxt"></span><span class="hint">[ 클릭 ]</span></div>

  <!-- 세팅사진 UI -->
  <div id="sensor"><svg viewBox="0 0 60 60"><g fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
    <circle cx="30" cy="42" r="3" fill="#fff" stroke="none"/>
    <path d="M20 34 a14 14 0 0 1 20 0"/>
    <path d="M14 27 a24 24 0 0 1 32 0"/>
  </g></svg></div>
  <div id="shutterInfo" class="hidden"></div>
  <div id="flash"></div>
  <div id="fade" style="position:fixed; inset:0; background:#000; z-index:80; opacity:0; pointer-events:none; transition:opacity 1s ease;"></div>

  <div id="macHotspot" style="display:none;"></div>

  <div id="crt"></div>
</div>

<!-- 맥북 오버레이: 미니게임3 이후, 처음 봤던 맥 데스크탑 그대로 -->
<div id="macOverlay">
  <div class="menubar"><span></span><span style="font-weight:600">Finder</span><span class="sp"></span><span id="macClock2"></span></div>
  <div class="dock">
    <div class="dapp" style="background:linear-gradient(160deg,#67e26f,#22b93c)" data-mac="msg">💬</div>
    <div class="dapp" style="background:#fff" data-mac="chrome">
      <svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="12" r="9.5" fill="none" stroke="#dadce0"/><path d="M12 2.5a9.5 9.5 0 0 1 8.2 4.75H12a4.75 4.75 0 0 0-4.5 3.2z" fill="#EA4335"/><path d="M3.8 7.25a9.5 9.5 0 0 0 4.1 13.1l4.1-7.1a4.75 4.75 0 0 1-3.9-2.8z" fill="#34A853"/><path d="M20.2 7.25A9.5 9.5 0 0 1 12 21.5c-1.4 0-2.8-.3-4.1-.9l4.1-7.1a4.75 4.75 0 0 0 4.3-6.25z" fill="#FBBC05"/><circle cx="12" cy="12" r="4" fill="#4285F4" stroke="#fff" stroke-width="0.8"/></svg>
    </div>
    <div class="dapp" style="background:#fff" data-mac="slack">
      <svg width="24" height="24" viewBox="0 0 24 24"><g>
        <rect x="9" y="2.5" width="3" height="8" rx="1.5" fill="#36C5F0"/>
        <rect x="12.5" y="9" width="8" height="3" rx="1.5" fill="#2EB67D"/>
        <rect x="12" y="13.5" width="3" height="8" rx="1.5" fill="#ECB22E"/>
        <rect x="3.5" y="12" width="8" height="3" rx="1.5" fill="#E01E5A"/>
      </g></svg>
    </div>
    <div class="dapp" style="background:linear-gradient(160deg,#FFE3B0,#E8A33D)" data-mac="fortune">☀️</div>
  </div>

  <!-- 오늘의 운세 창 -->
  <div class="mwin2" id="fortuneWin">
    <div class="mtitle"><span class="dot r" data-close2="fortuneWin"></span><span class="dot y"></span><span class="dot g"></span><span class="tname">오늘의 운세</span></div>
    <div class="fortune-body">
      <div class="cap">TODAY'S FORTUNE</div>
      <div class="kor">오늘의 운세</div>
      <div id="fortuneBody2"></div>
    </div>
  </div>
</div>
<div class="toast2" id="toast2"></div>

<script src="telemetry.js"></script>
<script>
const stage = document.getElementById("stage");
const bg = document.getElementById("bg");
const notifWrap = document.getElementById("macNotif");
const mono = document.getElementById("monologue");
const monoTxt = mono.querySelector(".mtxt");

const A = "assets/mini/";
const playerFull = (JSON.parse(localStorage.getItem("storylab_player")||"null")||{}).full || "이용자";
const playerName = (JSON.parse(localStorage.getItem("storylab_player")||"null")||{}).short || "이용";
const WHITELIST = ["임새람","이주은","박가연","김아량","황혜지","박해란","이나연","박다솜","김정민","김유진","김도연","육예은"];
const F_MAIN  = "오늘은 예기치못한 손님을 맞이하게 됩니다. 공간을 운영하는 사람이라면 운영 준비에 힘 쓰세요.";
const F_YUJIN = "오늘은 꿈에 그리던 목표를 이루는 날 입니다. 궁금해하던 얼굴을 확인할 수 있습니다. 가급적 많은 동료들과 함께하세요. 이미 경험해본 것을 경험할 수 있습니다.";
const F_AGAIN = "오늘은 대박이 터질 날입니다. 이왕이면 로또 당첨되는 게 좋겠네요. 좋은 하루 되세요!";
const F_LATER = [
  "누군가 자신의 운세를 궁금해할 하루입니다. 자신의 이름을 검색해봤는데 신기한 결과가 나올 수도 있습니다.",
  "오늘은 어고집밥에 가서 기깔한 한 끼를 할 운명입니다.",
  "너무 기찮다.;; 운세 쓰는 것도 힘드네요",
  "잘 아시겠지만 이 게임은 모두 허구입니다. 처음부터 끝까지 맞는 글자가 단 한 개도 없어요.",
];
function setBg(file, filter){
  bg.style.backgroundImage = `url(${A}${file})`;
  bg.style.filter = filter || "none";
}

// ---------- 독백 ----------
let monoQueue = [], monoCb = null;
function say(lines, cb){
  monoQueue = Array.isArray(lines) ? [...lines] : [lines];
  monoCb = cb || null;
  nextMono();
}
function nextMono(){
  const t = monoQueue.shift();
  if(t===undefined){
    mono.style.display = "none";
    const cb = monoCb; monoCb = null;
    if(cb) cb();
    return;
  }
  monoTxt.textContent = t;
  mono.style.display = "block";
}
mono.addEventListener("click", nextMono);

// ---------- 슬랙 알림 ----------
let notifTimer = null;
function pushNotif(title, msg, onClick){
  const el = document.createElement("div");
  el.className = "notif";
  const now = new Date();
  const hh = now.getHours(), mm = String(now.getMinutes()).padStart(2,"0");
  const ampm = hh<12 ? "오전" : "오후";
  const h12 = ((hh+11)%12)+1;
  el.innerHTML = `
    <div class="ic">S</div>
    <div class="body">
      <div class="top"><span class="title">Slack</span><span>${ampm} ${h12}:${mm}</span></div>
      <div class="msg"><b>${title}</b><br>${msg}</div>
    </div>`;
  el.addEventListener("click", ()=>{
    if(notifTimer){ clearInterval(notifTimer); notifTimer=null; }
    notifWrap.innerHTML = "";
    onClick && onClick();
  });
  notifWrap.appendChild(el);
  // 최대 4개만 유지
  while(notifWrap.children.length > 4) notifWrap.removeChild(notifWrap.firstChild);
}
// 무시하면 계속 쌓이는 알림
function nagNotif(title, msgs, onClick){
  let i = 0;
  pushNotif(title, msgs[0], onClick);
  notifTimer = setInterval(()=>{
    i = (i+1) % msgs.length;
    pushNotif(title, msgs[i], onClick);
  }, 4200);
}

/* ================================================================
   미니게임 1 — 필통 정리 (실제 사진 속 한 칸을 가리고, 뭐가 있었는지 맞히기)
   ⚠️ COMPARTMENTS 좌표/정답은 실제 사진 기준 대략값 — 어긋나면 좌표만 조정하면 됨
   ================================================================ */
const ITEM_ICONS = {
  가위:     `<svg viewBox="0 0 40 40"><circle cx="12" cy="12" r="5" fill="none" stroke="#333" stroke-width="2.5"/><circle cx="12" cy="28" r="5" fill="none" stroke="#333" stroke-width="2.5"/><path d="M16 14 L34 34 M16 26 L34 6" stroke="#333" stroke-width="2.5" stroke-linecap="round"/></svg>`,
  커터칼:   `<svg viewBox="0 0 40 40"><rect x="6" y="16" width="16" height="8" rx="1" fill="#e2453c"/><path d="M22 18 L36 14 L36 22 L22 22 Z" fill="#ddd" stroke="#999" stroke-width="1"/></svg>`,
  볼펜:     `<svg viewBox="0 0 40 40"><rect x="18" y="4" width="4" height="24" fill="#2255aa"/><path d="M18 28 L22 28 L20 36 Z" fill="#333"/><rect x="17" y="3" width="6" height="4" fill="#111"/></svg>`,
  연필:     `<svg viewBox="0 0 40 40"><rect x="17" y="4" width="6" height="22" fill="#e8a33d"/><path d="M17 26 L23 26 L20 36 Z" fill="#c9975a"/><rect x="17" y="2" width="6" height="4" fill="#e06a5a"/></svg>`,
  화이트펜: `<svg viewBox="0 0 40 40"><rect x="17" y="4" width="6" height="24" rx="2" fill="#f5f5f0" stroke="#ccc" stroke-width="1"/><rect x="16" y="2" width="8" height="4" rx="1" fill="#333"/></svg>`,
};
// 실제 사진 기준 칸 위치(% 좌표)와 정답 — 어긋나면 좌표만 조정
const COMPARTMENTS = [
  { key:"가위",     x1:6,  y1:6,  x2:42, y2:62 },
  { key:"볼펜",     x1:40, y1:8,  x2:65, y2:46 },
  { key:"커터칼",   x1:60, y1:30, x2:80, y2:62 },
  { key:"화이트펜", x1:70, y1:40, x2:90, y2:68 },
  { key:"연필",     x1:52, y1:66, x2:94, y2:98 },
];
const TOTAL_STAGES = 6;

function startPencil(){
  setBg("bg_pencilcase2.jpg");
  let stageNum = 0, wrongTotal = 0;
  const order = COMPARTMENTS.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  order.push(order[0]); // 6스테이지 채우기(5칸 + 1 반복)

  const panel = document.createElement("div");
  panel.className = "panel";
  panel.innerHTML = `
    <h2>필통 정리 <span id="pcStageLabel" style="font-size:11px; opacity:0.6"></span></h2>
    <div class="sub">가려진 칸에 무엇이 있었는지 클릭하세요.</div>
    <div class="ink-frame">
      <div class="ink-photo" id="inkPhoto"></div>
      <canvas id="inkCanvas" width="600" height="340"></canvas>
    </div>
    <div class="pc-grid" id="pcIcons" style="grid-template-columns:repeat(5,1fr); margin-top:14px;"></div>
    <div class="row"><span class="feedback" id="pcFb"></span></div>`;
  stage.appendChild(panel);

  const canvas = panel.querySelector("#inkCanvas");
  const ctx = canvas.getContext("2d");

  // 사진 속 칸 하나를 찢어진 듯한 검은 마스크로 가림
  function drawMask(comp){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const x1 = comp.x1/100*canvas.width,  y1 = comp.y1/100*canvas.height;
    const x2 = comp.x2/100*canvas.width,  y2 = comp.y2/100*canvas.height;
    ctx.fillStyle = "rgba(5,5,6,0.97)";
    ctx.beginPath();
    const jag = 7; // 가장자리 삐뚤빼뚤하게
    const pts = [];
    const perim = [[x1,y1],[x2,y1],[x2,y2],[x1,y2]];
    for(let side=0; side<4; side++){
      const [ax,ay] = perim[side];
      const [bx,by] = perim[(side+1)%4];
      for(let i=0;i<jag;i++){
        const t = i/jag;
        const px = ax+(bx-ax)*t + (Math.random()-0.5)*10;
        const py = ay+(by-ay)*t + (Math.random()-0.5)*10;
        pts.push([px,py]);
      }
    }
    pts.forEach(([px,py],i)=> i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py));
    ctx.closePath(); ctx.fill();
  }
  function shakePanel(){
    stage.animate([{transform:"translateX(0)"},{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],{duration:220});
  }

  function renderStage(){
    const comp = COMPARTMENTS[order[stageNum]];
    stageNum++;
    panel.querySelector("#pcStageLabel").textContent = `${stageNum} / ${TOTAL_STAGES}`;
    drawMask(comp);

    const grid = panel.querySelector("#pcIcons");
    grid.innerHTML = "";
    Object.keys(ITEM_ICONS).forEach(key=>{
      const cell = document.createElement("div");
      cell.className = "pc-icon-cell";
      cell.dataset.key = key;
      cell.innerHTML = `<div class="pc-icon">${ITEM_ICONS[key]}</div><div class="pc-icon-nm">${key}</div>`;
      cell.addEventListener("click", ()=>{
        if(key===comp.key){
          panel.querySelector("#pcFb").textContent = "";
          if(stageNum>=TOTAL_STAGES){ panel.remove(); onPencilDone(); }
          else { renderStage(); }
        } else {
          wrongTotal++;
          panel.querySelector("#pcFb").textContent = "아닌 것 같은데...";
          shakePanel();
          cell.animate([{transform:"scale(1)"},{transform:"scale(0.9)"},{transform:"scale(1)"}],{duration:180});
          if(wrongTotal===3){
            panel.querySelector("#pcFb").textContent = "";
            say("그래…. 운영자 매뉴얼이 있었지. 이럴 때 봐야겠어.", ()=>{});
          }
        }
      });
      grid.appendChild(cell);
    });
  }
  renderStage();
}
function onPencilDone(){
  saveGame("figure");
  nvlog("pencil_done", {});
  say("정리 끝. 이제 좀 낫네.", ()=>{
    setTimeout(startFigureIntro, 900);
  });
}

/* ================================================================
   미니게임 2 — 피규어 순서 (실제 공간 확인 필요)
   정답: 화난 표정 → 양말 → 주먹 → 막대기
   ================================================================ */
const FIG_ICONS = ["😠","🧦","✊","🪄"];   // 화난표정/양말/주먹/막대기(지팡이)
const FIG_ANSWER = ["😠","🧦","✊","🪄"];
function startFigureIntro(){
  nagNotif("OOO", [
    "OO님! 공간 기획하면서 산 거 정산해야하는데, 이거 보고 구매 내역 맞춰주실 수 있나요?",
    "확인 되면 알려주세요~",
    "천천히 하셔도 돼요!",
  ], startFigure);
}
function startFigure(){
  setBg("bg_room.jpg");
  let fails = 0;
  const order = [null,null,null,null];
  const pool = [...FIG_ICONS];

  const panel = document.createElement("div");
  panel.className="panel";
  panel.innerHTML = `
    <h2>구매 내역 순서 맞추기</h2>
    <div class="sub">실제 진열된 순서대로 배치해주세요. (칸을 누르면 다음 아이콘으로 바뀝니다)</div>
    <div class="fig-row"></div>
    <div class="row"><span class="feedback" id="figFb"></span><button class="btn" id="figSubmit">제출</button></div>`;
  stage.appendChild(panel);
  const row = panel.querySelector(".fig-row");
  for(let i=0;i<4;i++){
    const slot=document.createElement("div"); slot.className="fig-slot"; slot.dataset.i=i;
    slot.textContent="＋";
    slot.addEventListener("click",()=>{
      // 현재 아이콘의 다음으로 순환 (빈칸→0→1→2→3→빈칸)
      let cur = order[i]===null ? -1 : FIG_ICONS.indexOf(order[i]);
      cur = (cur+1) % (FIG_ICONS.length+1);
      order[i] = cur===FIG_ICONS.length ? null : FIG_ICONS[cur];
      slot.textContent = order[i]===null ? "＋" : order[i];
    });
    row.appendChild(slot);
  }
  panel.querySelector("#figSubmit").addEventListener("click",()=>{
    const fb = panel.querySelector("#figFb");
    if(order.some(o=>o===null)){ fb.textContent="네 칸을 모두 채워주세요."; return; }
    if(order.every((o,i)=>o===FIG_ANSWER[i])){
      panel.remove();
      if(notifTimer){ clearInterval(notifTimer); notifTimer=null; }
      notifWrap.innerHTML="";
      nvlog("figure_done", {fails});
      say("이 순서였네. 정산 완료.", ()=>{
        localStorage.setItem("storylab_mac_visit", "2");
        saveGame("desk2");
        nvlog("mac_visit2_start", {});
        const f=document.getElementById("fade");
        f.style.opacity=1;
        setTimeout(()=>{ location.href="desk.html"; }, 1100);
      });
    } else {
      fails++;
      stage.animate([{transform:"translateX(0)"},{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],{duration:220});
      // 단계별 힌트 (상대가 슬랙으로)
      if(fails===2) pushNotif("OOO","4층 가서 한 번만 확인해보세요!", ()=>{});
      else if(fails===3||fails===4) pushNotif("OOO","상상공상 쪽에요!", ()=>{});
      else if(fails>=5) pushNotif("OOO","상상공상에 도비요!", ()=>{});
      fb.textContent="순서가 아직 안 맞아요.";
    }
  });
}

/* ================================================================
   미니게임 3 — 세팅사진 촬영 (2곳)
   지점1: 직접 쓴 책 간판 서가 / 지점2: DVD 사진 벽(존재의 방)
   ================================================================ */
function startPhotoIntro(){
  pushNotif("OOO",
    "오늘 이용자 없으니까 저번에 못 찍은 세팅사진 찍어둘게요. 직접 쓴 책 간판이랑, dvd 사진 벽 한 번에 나오게 찍어주세요! 총 두 장!",
    startPhoto);
}
const camView = document.getElementById("camView");
const sensor = document.getElementById("sensor");
const shutterInfo = document.getElementById("shutterInfo");
const flash = document.getElementById("flash");
// 촬영 지점: 순차 진행. 각 지점은 자기 배경 위에서만 활성화
const SHOTS = [
  { x:10, y:18, name:"직접 쓴 책 간판", bg:"bg_shelf_labels.jpg" },
  { x:52, y:44, name:"DVD 사진 벽",    bg:"bg_room.jpg", finale:true },
];
let shotIdx = 0;

function startPhoto(){
  if(notifTimer){ clearInterval(notifTimer); notifTimer=null; }
  notifWrap.innerHTML="";
  shotIdx = 0;
  setBg(SHOTS[0].bg);
  camView.style.display="block";
  shutterInfo.classList.remove("hidden");
  shutterInfo.textContent = "세팅이 잘 보이는 지점을 찾아 촬영하세요 (0/2)";

  camView.addEventListener("mousemove", onCamMove);
  camView.addEventListener("click", onCamClick);
}
function currentShot(){ return SHOTS[shotIdx] || null; }
function shotDist(px,py){
  const s = currentShot();
  if(!s) return {best:null, bd:999};
  return {best:s, bd:Math.hypot(px-s.x, py-s.y)};
}
function onCamMove(e){
  const r = stage.getBoundingClientRect();
  const px = ((e.clientX-r.left)/r.width)*100;
  const py = ((e.clientY-r.top)/r.height)*100;
  const {best, bd} = shotDist(px,py);
  if(best && bd < 22){
    const strength = 1 - (bd/22);       // 0~1
    sensor.style.opacity = (0.2 + strength*0.8).toFixed(2);
    sensor.style.left = e.clientX-r.left+"px";
    sensor.style.top  = e.clientY-r.top+"px";
    const sc = 0.7 + strength*0.9;
    sensor.style.transform = `scale(${sc})`;
    sensor.dataset.ready = (bd < 7) ? "1" : "0";
    sensor.querySelectorAll("path,circle").forEach(el=>el.setAttribute("stroke", bd<7?"#7CFC9A":"#fff"));
  } else {
    sensor.style.opacity = 0;
    sensor.dataset.ready = "0";
  }
}
function onCamClick(e){
  const r = stage.getBoundingClientRect();
  const px = ((e.clientX-r.left)/r.width)*100;
  const py = ((e.clientY-r.top)/r.height)*100;
  const {best, bd} = shotDist(px,py);
  if(best && bd < 7){
    // 촬영!
    flash.animate([{opacity:0},{opacity:0.9},{opacity:0}],{duration:260});
    const dot=document.createElement("div"); dot.className="shot-dot";
    dot.style.left=(best.x)+"%"; dot.style.top=(best.y)+"%";
    stage.appendChild(dot);
    shotIdx++;
    shutterInfo.textContent = `세팅이 잘 보이는 지점을 찾아 촬영하세요 (${shotIdx}/2)`;

    if(best.finale){
      // 두 번째(DVD 사진 벽 = 존재의 방) → 마지막 연출로
      camView.removeEventListener("mousemove", onCamMove);
      camView.removeEventListener("click", onCamClick);
      sensor.style.opacity=0;
      saveGame("twist");
      nvlog("photos_done", {});
      setTimeout(()=>{
        shutterInfo.classList.add("hidden");
        say("두 장 다 찍었다. 에어드롭으로 맥북에 옮기자.", ()=>{
          setBg("bg_desk.jpg");
          say("…가까이에 있으니까, 유진님 맥북 잠깐 쓸까.", showMacHotspot);
        });
      }, 500);
    } else {
      // 첫 지점 → 도트 정리 후 다음 배경으로 전환
      setTimeout(()=>{
        document.querySelectorAll(".shot-dot").forEach(d=>d.remove());
        setBg(currentShot().bg);
      }, 400);
    }
  }
}

function endProto(){
  const panel=document.createElement("div"); panel.className="panel";
  panel.style.textAlign="center";
  panel.innerHTML=`<h2 style="margin-bottom:10px">미니게임 3종 완료</h2>
    <div class="sub" style="margin-bottom:16px">필통 정리 · 피규어 순서 · 세팅사진 촬영<br>이후 "김유진 맥북 슬랙 관점전환 → 3D 클라이맥스"로 이어집니다.</div>
    <button class="btn" onclick="location.reload()">다시 플레이</button>`;
  stage.appendChild(panel);
}

/* ================================================================
   맥북 (미니게임3 이후) — 클릭해야 진행, 처음 봤던 데스크탑 그대로
   ================================================================ */
const macHotspot = document.getElementById("macHotspot");
// 책상 사진(bg_desk.jpg) 위 맥북 위치 (필요시 % 값 조정)
macHotspot.style.left = "46%";
macHotspot.style.top  = "55%";
function showMacHotspot(){
  macHotspot.style.display = "block";
  macHotspot.addEventListener("click", openMacOverlay, { once:true });
}
function openMacOverlay(){
  macHotspot.style.display = "none";
  document.getElementById("macOverlay").classList.add("on");
}
function tickMacClock2(){
  const d=new Date(); const days=["일","월","화","수","목","금","토"];
  const el = document.getElementById("macClock2");
  if(el) el.textContent = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}) ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
}
setInterval(tickMacClock2, 1000); tickMacClock2();

function toast2(msg){
  const t=document.getElementById("toast2");
  t.textContent = msg;
  t.classList.add("on");
  setTimeout(()=> t.classList.remove("on"), 1800);
}

document.querySelectorAll("#macOverlay [data-mac]").forEach(d=>{
  d.addEventListener("click", ()=>{
    const kind = d.dataset.mac;
    if(kind==="msg"){ toast2("이미 다 읽었다."); }
    else if(kind==="chrome"){ toast2("더 볼 건 없어 보인다."); }
    else if(kind==="fortune"){ openFortuneWin(); }
    else if(kind==="slack"){
      document.getElementById("macOverlay").classList.remove("on");
      const f=document.getElementById("fade");
      f.style.opacity = 1;
      setTimeout(()=>{ location.href = "twist.html"; }, 1050);
    }
  });
});
document.querySelectorAll("[data-close2]").forEach(x=>{
  x.addEventListener("click", (e)=>{ e.stopPropagation(); document.getElementById(x.dataset.close2).classList.remove("on"); });
});

/* ---------- 오늘의 운세 (맥 창 버전, 계속 볼 수 있음) ---------- */
function renderFortune2(){
  const box = document.getElementById("fortuneBody2");
  const own = (playerFull==="김유진") ? F_YUJIN : F_MAIN;

    <div class="fcard"><div class="fcap">${playerName}님의 오늘</div><div class="ftxt">${own}</div></div>

function openFortuneWin(){
  renderFortune2();
  document.getElementById("fortuneWin").classList.add("on");
}

/* ================================================================
   자동 저장 (localStorage)
   ================================================================ */
const SAVE_KEY = "storylab_progress";
function saveGame(stage){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify({stage, t:Date.now()})); }catch(e){}
}
function loadGame(){
  try{ return JSON.parse(localStorage.getItem(SAVE_KEY)); }catch(e){ return null; }
}
function clearGame(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

const STAGE_START = {
  pencil: startFromBeginning,
  figure: ()=>{ setBg("bg_room.jpg"); startFigureIntro(); },
  photo:  ()=>{ setBg("bg_shelf_labels.jpg"); startPhotoIntro(); },
  twist:  ()=>{ location.href="twist.html"; },
  done:   ()=>{ setBg("bg_room.jpg"); endProto(); },
};

function startFromBeginning(){
  setBg("bg_frontview.jpg");
  say([
    "운영까지 30분 남았다....",
    "유진님은 어디로 가셨지?",
    "그 회사로 가신건가?",
  ], ()=>{
    nagNotif("OOO", [
      "oo님! 제가 점심이 늦게 나와서 늦게 갈 것 같아요!",
      "ㅜㅜ 유진님 아직 안 오셨어요?",
      "여튼 공간 세팅 좀 부탁드려요!",
    ], ()=>{
      say("필통 세팅을 해둘까…", startPencil);
    });
  });
}

/* ================================================================
   시작: 저장이 있으면 이어하기 제안
   ================================================================ */
const save = loadGame();
if(localStorage.getItem("storylab_direct_photo")==="1"){
  localStorage.removeItem("storylab_direct_photo");
  STAGE_START["photo"]();
} else if(save && save.stage && save.stage !== "pencil" && STAGE_START[save.stage]){
  setBg("bg_frontview.jpg", "brightness(0.55)");
  const p=document.createElement("div"); p.className="panel"; p.style.textAlign="center";
  const label={figure:"피규어 순서", photo:"세팅사진 촬영", done:"완료"}[save.stage]||save.stage;
  p.innerHTML=`<h2 style="margin-bottom:8px">진행 기록이 있어요</h2>
    <div class="sub" style="margin-bottom:18px">마지막 지점: ${label}</div>
    <div class="row" style="justify-content:center">
      <button class="btn ghost" id="restart">처음부터</button>
      <button class="btn" id="resume">이어하기</button>
    </div>`;
  stage.appendChild(p);
  p.querySelector("#resume").addEventListener("click", ()=>{ p.remove(); bg.style.filter="none"; STAGE_START[save.stage](); });
  p.querySelector("#restart").addEventListener("click", ()=>{ clearGame(); p.remove(); bg.style.filter="none"; startFromBeginning(); });
} else {
  startFromBeginning();
}
</script>
