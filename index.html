<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>스토리랩</title>
<style>
  html,body{ height:100%; margin:0; background:#0b0b0e; color:#d8d8d8;
    font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;
    display:flex; align-items:center; justify-content:center; }
  .wrap{ text-align:center; }
  h1{ font-size:15px; letter-spacing:0.35em; color:#c1121f; font-weight:600; margin:0 0 6px; }
  p{ font-size:12px; color:#77777d; letter-spacing:0.08em; margin:0 0 34px; }
  a{ display:block; width:260px; margin:12px auto; padding:14px 0;
    border:1px solid #2b2b31; border-radius:10px; color:#d8d8d8;
    text-decoration:none; font-size:13.5px; letter-spacing:0.06em;
    transition:border-color 0.2s, background 0.2s; }
  a:hover{ border-color:#c1121f; background:rgba(193,18,31,0.06); }
  .note{ margin-top:36px; font-size:10.5px; color:#4a4a50; letter-spacing:0.1em; }
</style>
</head>
<body>
  <div class="wrap" id="menu" style="display:none">
    <h1>STORYLAB</h1>
    <p>개발 빌드 — 완성 시 이 화면은 게임 시작으로 교체됩니다</p>
    <a href="intro.html">▶ 게임 시작 (도입부: 운세 → 슬랙)</a>
    <a href="desk.html">책상 수색 (충전선 · 메시지 · 노스텔지아)</a>
    <a href="minigames.html">미니게임 3종 (필통 · 피규어 · 세팅사진)</a>
    <a href="scene3d.html">클라이맥스 3D 공간</a>
    <a href="twist.html">관점전환 슬랙</a>
    <a href="ending.html">메타 엔딩</a>
    <div class="note">Chrome 권장 · 전체화면 추천</div>
  </div>
  <div class="wrap" id="gate" style="display:none">
    <h1>STORYLAB</h1>
    <p style="margin-bottom:14px">이 게임은 <b style="color:#d8d8d8">노트북 + Chrome 브라우저</b> 전용입니다.</p>
    <p style="margin-bottom:30px">맥북에서 크롬으로 이 링크를 다시 열어주세요.</p>
    <a href="#" id="forceEnter" style="width:200px; font-size:11.5px; opacity:0.6">환경이 맞는데도 이 화면이 보여요</a>
  </div>
<script>
  const ua = navigator.userAgent;
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua) || (navigator.maxTouchPoints>1 && innerWidth<900);
  const isChrome = /Chrome\//.test(ua) && !/Edg\/|OPR\//.test(ua);
  if(isMobile || !isChrome){
    document.getElementById("gate").style.display="block";
  } else {
    document.getElementById("menu").style.display="block";
  }
  document.getElementById("forceEnter").addEventListener("click",(e)=>{
    e.preventDefault();
    document.getElementById("gate").style.display="none";
    document.getElementById("menu").style.display="block";
  });
</script>
</body>
</html>
